name: Keep Neon DB warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: keep-db-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping DB-touching endpoint 3 times over ~3min
        run: |
          URL="https://rfid-laundry-backend-production.up.railway.app/api/tenants"
          for i in 1 2 3; do
            ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            code=$(curl -s -o /dev/null -w "%{http_code} %{time_total}s" --max-time 30 "$URL" || echo "000 timeout")
            echo "[$ts] ping $i -> $code"
            [ $i -lt 3 ] && sleep 90
          done
